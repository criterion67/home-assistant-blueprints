blueprint:
  name: Controller - Philips 8718699693985 Hue Smart Button
  description: "# Controller - Philips 8718699693985 Hue Smart Button\n\nController
    automation for executing any kind of action triggered by the provided Philips
    8718699693985 Hue Smart Button. Allows to optionally loop an action on a button
    long press.\nSupports deCONZ, ZHA, Zigbee2MQTT.\n\nAutomations created with this
    blueprint can be connected with one or more [Hooks](https://epmatt.github.io/awesome-ha-blueprints/docs/blueprints/hooks)
    supported by this controller.\nHooks allow to easily create controller-based automations
    for interacting with media players, lights, covers and more.\nSee the list of
    [Hooks available for this controller](https://epmatt.github.io/awesome-ha-blueprints/docs/blueprints/controllers/philips_8718699693985#available-hooks)
    for additional details.\n\n## More Info\n\nℹ️ Version 2025.04.19\n\U0001F4DD [Changelog](https://epmatt.github.io/awesome-ha-blueprints/docs/blueprints/controllers/philips_8718699693985/#changelog)\n\U0001F4D5
    Full documentation regarding this blueprint is available [here](https://epmatt.github.io/awesome-ha-blueprints/docs/blueprints/controllers/philips_8718699693985).\n\n\U0001F680
    This blueprint is part of the **[Awesome HA Blueprints](https://epmatt.github.io/awesome-ha-blueprints)
    project**. Please consider **[leaving a star on GitHub](https://github.com/EPMatt/awesome-ha-blueprints)**!
    \U0001F31F\n"
  source_url: https://github.com/EPMatt/awesome-ha-blueprints/blob/main/blueprints/controllers/philips_8718699693985/philips_8718699693985.yaml
  domain: automation
  homeassistant:
    min_version: 2024.10.0
  input:
    integration:
      name: (Required) Integration
      description: Integration used for connecting the remote with Home Assistant.
        Select one of the available values.
      selector:
        select:
          options:
          - deCONZ
          - ZHA
          - Zigbee2MQTT
          sort: false
          custom_value: false
          multiple: false
    controller_device:
      name: (deCONZ, ZHA, Zigbee2MQTT Required) Controller Device
      description: The controller device to use for the automation. Choose a value
        only if the remote is integrated with deCONZ, ZHA, Zigbee2MQTT.
      default: ''
      selector:
        device:
          filter:
          - integration: mqtt
            manufacturer: Philips
            model: Hue smart button
          - integration: mqtt
            manufacturer: Philips
            model: Hue smart button (8718699693985)
          - integration: zha
            manufacturer: Philips
          - integration: deconz
            manufacturer: Philips
          multiple: false
    helper_last_controller_event:
      name: (Required) Helper - Last Controller Event
      description: Input Text used to store the last event fired by the controller.
        You will need to manually create a text input entity for this, please read
        the blueprint Additional Notes for more info.
      default: ''
      selector:
        entity:
          domain:
          - input_text
          reorder: false
          multiple: false
    action_button_short:
      name: (Optional) Button short press
      description: Action to run on short button press.
      default: []
      selector:
        action: {}
    action_button_long:
      name: (Optional) Button long press
      description: Action to run on long button press.
      default: []
      selector:
        action: {}
    action_button_release:
      name: (Optional) Button release
      description: Action to run on button release after long press.
      default: []
      selector:
        action: {}
    action_button_double:
      name: (Optional) (Virtual) Button double press
      description: Action to run on double button press.
      default: []
      selector:
        action: {}
    button_long_loop:
      name: (Optional) Button long press - loop until release
      description: Loop the button action until the button is released.
      default: false
      selector:
        boolean: {}
    button_long_max_loop_repeats:
      name: (Optional) Button long press - Maximum loop repeats
      description: Maximum number of repeats for the custom action, when looping is
        enabled. Use it as a safety limit to prevent an endless loop in case the corresponding
        stop event is not received.
      default: 500
      selector:
        number:
          min: 1.0
          max: 5000.0
          mode: slider
          step: 1.0
    button_double_press:
      name: (Optional) Expose button double press event
      description: Choose whether or not to expose the virtual double press event
        for the button. Turn this on if you are providing an action for the button
        double press event.
      default: false
      selector:
        boolean: {}
    helper_double_press_delay:
      name: (Optional) Helper - Double Press delay
      description: Max delay between the first and the second button press for the
        double press event. Provide a value only if you are using a double press action.
        Increase this value if you notice that the double press action is not triggered
        properly.
      default: 500
      selector:
        number:
          min: 100.0
          max: 5000.0
          unit_of_measurement: milliseconds
          mode: box
          step: 10.0
    helper_debounce_delay:
      name: (Optional) Helper - Debounce delay
      description: Delay used for debouncing RAW controller events, by default set
        to 0. A value of 0 disables the debouncing feature. Increase this value if
        you notice custom actions or linked Hooks running multiple times when interacting
        with the device. When the controller needs to be debounced, usually a value
        of 100 is enough to remove all duplicate events.
      default: 0
      selector:
        number:
          min: 0.0
          max: 1000.0
          unit_of_measurement: milliseconds
          mode: box
          step: 10.0
variables:
  ahb_version: 2025.11.04
  ahb_maintainers:
  - EPMatt
  integration: !input integration
  button_long_loop: !input button_long_loop
  button_long_max_loop_repeats: !input button_long_max_loop_repeats
  button_double_press: !input button_double_press
  helper_last_controller_event: !input helper_last_controller_event
  helper_double_press_delay: !input helper_double_press_delay
  helper_debounce_delay: !input helper_debounce_delay
  integration_id: '{{ integration | lower }}'
  adjusted_double_press_delay: '{{ [helper_double_press_delay - helper_debounce_delay,
    100] | max }}'
  actions_mapping:
    deconz:
      button_short:
      - '1000'
      button_long:
      - '1001'
      button_release:
      - '1003'
    zha:
      button_short:
      - on_short_release
      button_long:
      - on_hold
      button_release:
      - on_long_release
    zigbee2mqtt:
      button_short:
      - "on"
      button_long:
      - brightness_move_up
      button_release:
      - brightness_stop
  button_short: '{{ actions_mapping[integration_id]["button_short"] }}'
  button_long: '{{ actions_mapping[integration_id]["button_long"] }}'
  button_release: '{{ actions_mapping[integration_id]["button_release"] }}'
  controller_id: !input controller_device
mode: restart
max_exceeded: silent
triggers:
- trigger: device
  domain: mqtt
  device_id: !input controller_device
  type: action
  subtype: 'on'
- trigger: device
  domain: mqtt
  device_id: !input controller_device
  type: action
  subtype: 'off'
- trigger: device
  domain: mqtt
  device_id: !input controller_device
  type: action
  subtype: press
- trigger: device
  domain: mqtt
  device_id: !input controller_device
  type: action
  subtype: hold
- trigger: device
  domain: mqtt
  device_id: !input controller_device
  type: action
  subtype: release
- trigger: event
  event_type:
  - deconz_event
  - zha_event
  event_data:
    device_id: !input controller_device
conditions:
- '{%- set trigger_action -%} {%- if integration_id == "zigbee2mqtt" -%} {{ trigger.payload
  }} {%- elif integration_id == "deconz" -%} {{ trigger.event.data.event }} {%- elif
  integration_id == "zha" -%} {{ trigger.event.data.command }} {%- endif -%} {%- endset
  -%} {{ trigger_action not in ["","None"] }}'
actions:
- delay:
    milliseconds: !input helper_debounce_delay
- variables:
    trigger_action: '{%- if integration_id == "zigbee2mqtt" -%} {{ trigger.payload
      }} {%- elif integration_id == "deconz" -%} {{ trigger.event.data.event }} {%-
      elif integration_id == "zha" -%} {{ trigger.event.data.command }} {%- endif
      -%}'
    deserialized_state: '{{ (states(helper_last_controller_event) | from_json) if
      helper_last_controller_event is not none and (states(helper_last_controller_event)
      | regex_match("^\{\s*?((\"a\":\s*?\".*\"|\"t\":\s*?\d+\.\d+)(,\s*?)?){2}\s*?\}$"))
      else {} }}'
    trigger_delta: '{{ (as_timestamp(now()) - (deserialized_state.t | default(0)))
      * 1000 }}'
- action: input_text.set_value
  data:
    entity_id: !input helper_last_controller_event
    value: '{{ {"a":trigger_action,"t":as_timestamp(now())} | to_json }}'
- choose:
  - conditions: '{{ trigger_action | string in button_short }}'
    sequence:
    - choose:
      - conditions: '{{ button_double_press }}'
        sequence:
        - choose:
          - conditions: '{{ trigger_action | string == last_controller_event and trigger_delta
              | int <= helper_double_press_delay | int }}'
            sequence:
            - action: input_text.set_value
              data:
                entity_id: !input helper_last_controller_event
                value: '{{ {"a":"double_press","t":as_timestamp(now())} | to_json
                  }}'
            - event: ahb_controller_event
              event_data:
                controller: '{{ controller_id }}'
                action: button_double
            - choose:
              - conditions: []
                sequence: !input action_button_double
          default:
          - delay:
              milliseconds: '{{ adjusted_double_press_delay }}'
          - event: ahb_controller_event
            event_data:
              controller: '{{ controller_id }}'
              action: button_short
          - choose:
            - conditions: []
              sequence: !input action_button_short
      default:
      - event: ahb_controller_event
        event_data:
          controller: '{{ controller_id }}'
          action: button_short
      - choose:
        - conditions: []
          sequence: !input action_button_short
  - conditions: '{{ trigger_action | string in button_long }}'
    sequence:
    - event: ahb_controller_event
      event_data:
        controller: '{{ controller_id }}'
        action: button_long
    - choose:
      - conditions: '{{ button_long_loop }}'
        sequence:
        - repeat:
            while: '{{ repeat.index < button_long_max_loop_repeats | int }}'
            sequence: !input action_button_long
      default: !input action_button_long
  - conditions: '{{ trigger_action | string in button_release }}'
    sequence:
    - event: ahb_controller_event
      event_data:
        controller: '{{ controller_id }}'
        action: button_release
    - choose:
      - conditions: []
        sequence: !input action_button_release
